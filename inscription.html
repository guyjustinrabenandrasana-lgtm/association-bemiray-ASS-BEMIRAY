<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ASS Bemiray</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark: #1a5c2a;
            --green-mid: #2e7d32;
            --green-light: #4caf50;
            --green-pale: #e8f5e9;
            --gold: #f9a825;
            --gold-light: #fbc02d;
            --cream: #fdf6e3;
            --text-dark: #1a2e1c;
            --text-mid: #2c3e2d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #fdf6e3 50%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(253,246,227,0.97);
            backdrop-filter: blur(10px);
            padding: 0 2rem;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        .logo-wrap { display:flex; align-items:center; gap:12px; text-decoration:none; }
        .logo-wrap img { height:48px; }
        .logo-text .name { font-family:'Playfair Display',serif; font-weight:900; font-size:1.2rem; color:var(--green-dark); }
        .logo-text .tagline { font-size:0.6rem; color:var(--gold); font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
        nav ul { list-style:none; display:flex; gap:0.5rem; }
        nav a { text-decoration:none; color:var(--text-mid); font-weight:600; font-size:0.9rem; padding:6px 14px; border-radius:25px; transition:all 0.2s; }
        nav a:hover { color:var(--green-dark); background:var(--green-pale); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 3rem;
            width: 100%;
            max-width: 520px;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-header .badge {
            display: inline-block;
            background: var(--green-pale);
            color: var(--green-dark);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        .form-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--green-dark);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--green-dark);
            margin-bottom: 0.4rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: all 0.25s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--green-light);
            background: white;
            box-shadow: 0 0 0 4px rgba(76,175,80,0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
            letter-spacing: 0.03em;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26,92,42,0.35);
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--green-mid);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .back-link a:hover { color: var(--gold); }

        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; }
            .form-card { padding: 2rem 1.5rem; }
            nav { display: none; }
        }
    </style>
</head>
